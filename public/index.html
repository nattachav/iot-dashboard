<!DOCTYPE html>
<html>
<head>
  <title>IoT Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }
    .card {
      background: #222;
      padding: 20px;
      margin: 15px;
      border-radius: 15px;
      display: inline-block;
      width: 200px;
    }
  </style>
</head>

<body>

<h1>🚀 IoT Dashboard</h1>

<div class="card"><h2>🌡 Temp</h2><p id="temp">-</p></div>
<div class="card"><h2>💧 Humidity</h2><p id="hum">-</p></div>
<div class="card"><h2>💡 Light</h2><p id="light">-</p></div>
<div class="card"><h2>🔘 Button</h2><p id="button">-</p></div>

<script>
async function fetchData() {
  const res = await fetch("/data");
  const data = await res.json();

  document.getElementById("temp").innerText = data.temp;
  document.getElementById("hum").innerText = data.hum;
  document.getElementById("light").innerText = data.light;
  document.getElementById("button").innerText =
    data.button == 1 ? "Pressed" : "Released";
}

fetchData();
setInterval(fetchData, 2000);
</script>

</body>
</html>
